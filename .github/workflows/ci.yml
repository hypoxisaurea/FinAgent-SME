name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check backend tests

      - name: Pytest with coverage gate
        run: pytest tests/ --cov=backend --cov-report=term-missing --cov-fail-under=75
