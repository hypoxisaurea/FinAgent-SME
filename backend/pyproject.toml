# pyproject.toml

[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = [
    "backend/agents/risk_event/test.py",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle 기본 규칙
    "F",   # pyflakes (미사용 변수 등)
    "I",   # isort (import 정렬)
    "N",   # 네이밍 규칙
    "TID", # flake8-tidy-imports (import hygiene)
]
ignore = [
    "E501",  # 프롬프트/설명 문자열 중심 파일은 줄바꿈보다 원문 보존이 중요
]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"
